<section class="upload-container" (click)="!enviando && fileInput.click()" [attr.aria-busy]="enviando">
  <mat-icon class="upload-icon">cloud_upload</mat-icon>
  <span class="upload-text-main">Arraste seus arquivos de log ou clique para selecionar</span>
  <span class="upload-text-sub">Apenas arquivos de texto (.txt, .log)</span>
  
  <!-- Botão desabilita automaticamente se estiver enviando -->
  <button mat-flat-button color="primary" [disabled]="enviando" class="btn-upload-selecionar">
    <mat-icon *ngIf="!enviando">attach_file</mat-icon>
    <span>{{ enviando ? 'Enviando...' : 'Selecionar Arquivo' }}</span>
  </button>
  
  <!-- Mantido o accept e o nome da sua função original do TS -->
  <input 
    type="file" 
    #fileInput 
    class="input-file-oculto" 
    accept=".txt,.log"
    [disabled]="enviando"
    (change)="onArquivoSelecionado($event)">
</section>

<!-- Mantida a exibição das suas mensagens de status logo abaixo -->
<div
  *ngIf="mensagem"
  id="upload-status"
  style="margin-top: 20px; font-weight: bold; text-align: center;"
  [ngStyle]="{'color': enviando ? '#2196f3' : '#333'}"
  [attr.role]="mensagem.startsWith('❌') ? 'alert' : 'status'"
  aria-atomic="true"
>
  {{ mensagem }}
</div>
