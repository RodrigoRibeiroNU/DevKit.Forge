name: DevKit.Forge CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    name: Build & Test Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    # Define que todos os comandos npm vão rodar dentro da pasta do Client
    defaults:
      run:
        working-directory: ./DevKit.Forge.Client

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Versão LTS recomendada para o Angular
        cache: 'npm'
        cache-dependency-path: ./DevKit.Forge.Client/package-lock.json

    - name: Install Dependencies (Clean Install)
      run: npm ci

    - name: Build Angular Application
      run: npm run build